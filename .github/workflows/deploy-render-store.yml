# Deploy the render-store (customer storefront) app to EC2
# Required GitHub Secrets:
#   RENDER_STORE_EC2_SSH_KEY     - Private SSH key for EC2 (contents of .pem file)
#   RENDER_STORE_EC2_HOST        - EC2 hostname or IP
#   RENDER_STORE_EC2_USER        - SSH user (e.g. ubuntu, ec2-user)
#   RENDER_STORE_EC2_DEPLOY_PATH - Remote path (e.g. /home/ubuntu/merged-ziplofy-/render-store)

name: Deploy Render Store to EC2

on:
  push:
    branches: [main]
    paths:
      - 'render-store/**'
      # Bundled via @ziplofy/create-theme alias — rebuild storefront when runtimes change
      - 'Ziplofy/src/create-theme/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pin to match EC2 runtime and avoid Node engine mismatch warnings
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            render-store/package-lock.json
            Ziplofy/package-lock.json

      - name: Install Ziplofy dependencies (create-theme peer types)
        working-directory: Ziplofy
        run: npm ci

      - name: Install render-store dependencies
        working-directory: render-store
        run: npm ci

      - name: Build render-store
        working-directory: render-store
        run: npm run build

      - name: Deploy to EC2
        uses: easingthemes/ssh-deploy@v4
        env:
          SSH_PRIVATE_KEY: ${{ secrets.RENDER_STORE_EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.RENDER_STORE_EC2_HOST }}
          REMOTE_USER: ${{ secrets.RENDER_STORE_EC2_USER }}
          TARGET: ${{ secrets.RENDER_STORE_EC2_DEPLOY_PATH }}
        with:
          source: 'render-store/'
          exclude: 'node_modules'

      - name: Install deps and restart PM2 on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RENDER_STORE_EC2_HOST }}
          username: ${{ secrets.RENDER_STORE_EC2_USER }}
          key: ${{ secrets.RENDER_STORE_EC2_SSH_KEY }}
          # Non-interactive SSH does not load .bashrc; source nvm/fnm so npm uses Node 24.
          script: |
            set -e
            if [ -f "$HOME/.nvm/nvm.sh" ]; then
              export NVM_DIR="$HOME/.nvm"
              . "$NVM_DIR/nvm.sh"
            fi
            if command -v fnm >/dev/null 2>&1; then
              eval "$(fnm env)"
            fi
            [ -f "$HOME/.bashrc" ] && . "$HOME/.bashrc" || true
            echo "Using node: $(command -v node) ($(node -v))"
            cd ${{ secrets.RENDER_STORE_EC2_DEPLOY_PATH }}
            npm ci
            pm2 delete all || true
            pm2 start npm -- run preview
