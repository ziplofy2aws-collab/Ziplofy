# Nginx snippet for render-store hosts (*.ziplofy.com store subdomains OR preview.ziplofy.com).
# Merchant store hosts send X-Frame-Options: SAMEORIGIN by default, which blocks the admin theme editor iframe.
#
# Option A (recommended): DNS preview.ziplofy.com → render-store EC2, admin iframe loads preview.ziplofy.com/theme-preview
# Option B: On each store vhost, allow framing only for /theme-preview (below)

# --- Option A: dedicated preview host ---
# server {
#   server_name preview.ziplofy.com;
#   root /path/to/render-store/dist;
#   location / {
#     try_files $uri $uri/ /index.html;
#     add_header Content-Security-Policy "frame-ancestors https://admin.ziplofy.com https://dashboard.ziplofy.com https://*.ziplofy.com" always;
#   }
# }

# --- Option B: allow framing on store subdomains for preview path only ---
location = /theme-preview {
  proxy_hide_header X-Frame-Options;
  add_header Content-Security-Policy "frame-ancestors https://admin.ziplofy.com https://dashboard.ziplofy.com https://*.ziplofy.com" always;
  try_files $uri $uri/ /index.html;
}

location ^~ /remote-theme-runtime/ {
  proxy_hide_header X-Frame-Options;
  add_header Content-Security-Policy "frame-ancestors https://admin.ziplofy.com https://dashboard.ziplofy.com https://*.ziplofy.com" always;
  try_files $uri =404;
}
