# Add ABOVE `location / { try_files ... /index.html; }` on each merchant storefront vhost.
# Use the same upstream as your existing `/api/` proxy (Ziplofy3b backend — not render-store).

location = /sitemap.xml {
  proxy_pass http://ziplofy3b_api/sitemap.xml;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Real-IP $remote_addr;
}
