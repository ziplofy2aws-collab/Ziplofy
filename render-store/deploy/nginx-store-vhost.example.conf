# Example nginx vhost for merchant storefronts (*.ziplofy.com).
# Replace ZIPLOFY3B_API_UPSTREAM with your backend host (Ziplofy3b EC2 / load balancer).
#
#   ZIPLOFY3B_API_UPSTREAM examples:
#     http://10.0.1.42:5000
#     http://ziplofy3b.internal:5000
#     https://api.ziplofy.com

upstream ziplofy3b_api {
  server ZIPLOFY3B_API_UPSTREAM;
}

server {
  listen 443 ssl http2;
  server_name ~^(?<storesubdomain>[a-z0-9-]+)\.ziplofy\.com$;

  root /home/ubuntu/merged-ziplofy-/render-store/dist;
  index index.html;

  # SEO: never serve SPA shell for sitemap — proxy to backend runtime.
  location = /sitemap.xml {
    proxy_pass http://ziplofy3b_api/sitemap.xml;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/ {
    proxy_pass http://ziplofy3b_api/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /uploads/ {
    proxy_pass http://ziplofy3b_api/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
